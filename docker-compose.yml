services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: mal-recommender-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recommender}
      POSTGRES_USER: ${POSTGRES_USER:-recommender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recommender}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recommender} -d ${POSTGRES_DB:-recommender}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
